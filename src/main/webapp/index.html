<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassConnect | Your Academic Hub</title>
    <style>
        :root {
            /* Light & Professional Palette */
            --primary-indigo: #6366f1;
            --primary-hover: #4f46e5;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Light Mesh Gradient for a colorful but soft feel */
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, #e0e7ff 0, transparent 40%),
                radial-gradient(at 100% 0%, #fae8ff 0, transparent 40%),
                radial-gradient(at 50% 100%, #f0f9ff 0, transparent 50%);
            overflow: hidden;
        }

        .hero-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3.5rem;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 480px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.7);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }

        /* Subtle Hover Effect */
        .hero-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08);
        }

        .logo-icon {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            display: inline-block;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 2.8rem;
            margin: 0 0 12px 0;
            /* Gradient Text for a modern, colorful look */
            background: linear-gradient(135deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        p {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn {
            padding: 16px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }

        .btn-login {
            background: var(--primary-indigo);
            color: var(--white);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.2);
        }

        .btn-login:hover {
            background: var(--primary-hover);
            transform: scale(1.02);
            box-shadow: 0 12px 25px rgba(99, 102, 241, 0.3);
        }

        .btn-register {
            background: var(--white);
            color: var(--text-dark);
            border: 1px solid #e2e8f0;
        }

        .btn-register:hover {
            background: #f8fafc;
            border-color: var(--primary-indigo);
            color: var(--primary-indigo);
            transform: scale(1.02);
        }

        .footer-tag {
            margin-top: 2.5rem;
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="hero-card">
        <div class="logo-icon">🎓</div>
        <h1>ClassConnect</h1>
        <p>Your unified workspace for digital learning and academic collaboration.</p>
        
        <div class="button-group">
            <a href="login.html" class="btn btn-login">Login to Workspace</a>
            <a href="register.jsp" class="btn btn-register">Join as Student/Teacher</a>
        </div>

        <div class="footer-tag">
            Empowering Education
        </div>
    </div>

</body>
</html>
