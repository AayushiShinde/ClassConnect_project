<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ClassConnect</title>
    <style>
        :root {
            --primary-indigo: #6366f1;
            --primary-pink: #ec4899;
            --text-dark: #1e293b;
            --border-soft: rgba(226, 232, 240, 0.8);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Same light mesh gradient as index */
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, #e0e7ff 0, transparent 40%),
                radial-gradient(at 100% 0%, #fae8ff 0, transparent 40%),
                radial-gradient(at 50% 100%, #f0f9ff 0, transparent 50%);
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
            width: 380px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.7);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h2 {
            margin-bottom: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--primary-indigo), var(--primary-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border-soft);
            border-radius: 15px;
            box-sizing: border-box;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
            color: var(--text-dark);
        }

        /* Smooth focus effect */
        input:focus {
            outline: none;
            border-color: var(--primary-indigo);
            background: white;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.1);
        }

        input::placeholder {
            color: #94a3b8;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-indigo);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.2);
        }

        .btn:hover {
            background: #4f46e5;
            transform: scale(1.02);
            box-shadow: 0 12px 25px rgba(99, 102, 241, 0.3);
        }

        .footer-link {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #64748b;
        }

        .footer-link a {
            color: var(--primary-indigo);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Welcome Back</h2>
        <form action="login" method="post">
            <input type="email" name="email" placeholder="Institutional Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn">Sign In</button>
        </form>
        
        <div class="footer-link">
            New to ClassConnect? <a href="register.jsp">Create Account</a>
        </div>
    </div>

</body>
</html>
